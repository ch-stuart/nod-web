<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Nod — sleep noise, nothing else. A minimal noise app for iPhone."
    />
    <title>Nod — Sleep Noise app for iOS</title>
    <link rel="icon" type="image/avif" href="./images/app-icon/icon.avif" />
    <link rel="icon" type="image/webp" href="./images/app-icon/icon.webp" />
    <link rel="icon" type="image/png" href="./images/app-icon/icon.png" />
    <link rel="stylesheet" href="./main.css" />
    <script type="module" src="./main.ts"></script>
    <script
      defer
      src="https://cloud.umami.is/script.js"
      data-website-id="f63cf65f-da2f-48b4-a62d-eaf1ba0faa46"
    ></script>
  </head>
  <body>
    <!-- srcObject is set to the WebAudio MediaStream at play time; routing output
         through an <audio> element promotes the iOS session to "playback" category,
         bypassing the ringer/mute switch. -->
    <audio id="audio-output" aria-hidden="true"></audio>
    <a class="skipLink" href="#main">Skip to content</a>

    <header class="siteHeader">
      <div class="brand">
        <picture>
          <source srcset="./images/app-icon/icon.avif" type="image/avif" />
          <source srcset="./images/app-icon/icon.webp" type="image/webp" />
          <img
            src="./images/app-icon/icon.png"
            alt=""
            width="32"
            height="32"
            class="appIcon"
          />
        </picture>
        <span class="wordmark">Nod</span>
      </div>
    </header>

    <main id="main" class="siteMain">
      <section class="hero">
        <h1 class="heading">Sleep noise, nothing else.</h1>
        <p class="heroSub">
          Nod gives you a continuous range of noise, from bright and airy to
          warm and dark. Find the sound that helps you sleep, then let it run
          all night.
        </p>
      </section>

      <section id="player-section" class="screenshot" aria-label="Interactive noise player">
        <div id="device-frame" class="deviceFrame">
          <div
            id="grid-player"
            class="gridPlayer"
            role="button"
            aria-pressed="false"
            aria-label="Nod noise player — tap to play, drag to explore"
            tabindex="0"
          >
            <div id="device-notch" class="deviceNotch" aria-hidden="true"></div>
            <div id="grid-dot" class="gridDot"></div>
          </div>
        </div>
      </section>

      <section class="cta">
        <button
          class="appStoreLink"
          onclick="document.getElementById('coming-soon-dialog').showModal(); window.umami?.track('cta-tap')"
        >
          <img
            class="appStoreBadge"
            src="./images/download-on-app-store/Download_on_the_App_Store_Badge_US-UK_RGB_blk_092917.svg"
            alt="Download on the App Store"
            width="165"
            height="55"
          />
        </button>
      </section>
    </main>

    <dialog
      id="coming-soon-dialog"
      class="dialog"
      aria-labelledby="dialog-title"
    >
      <p id="dialog-title" class="dialogMessage">
        Coming soon to the App Store :)
      </p>
      <form method="dialog" class="dialogForm">
        <button class="dialog-close" autofocus>Got it</button>
      </form>
    </dialog>

    <footer class="siteFooter">
      <p class="footerText">&copy; 2026 Charles Stuart</p>
    </footer>
  </body>
</html>
